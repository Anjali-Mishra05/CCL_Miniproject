service: pm

provider:
  name: aws
  stage: dev
  region: ap-south-1
  runtime: nodejs18.x
  memorySize: 256
  timeout: 30
  
  environment:
    PETS_TABLE: pm-pets-${self:provider.stage}
    USERS_TABLE: pm-users-${self:provider.stage}
    MATCHES_TABLE: pm-matches-${self:provider.stage}
    ALERTS_TABLE: pm-alerts-${self:provider.stage}
    S3_BUCKET: pm-img-anjal-${self:provider.stage}
    COGNITO_CLIENT_ID: !Ref AuthClient
    COGNITO_POOL_ID: !Ref AuthPool
    ALERTS_TOPIC_ARN: arn:aws:sns:${self:provider.region}:${aws:accountId}:pm-alerts-${self:provider.stage}
    MATCHES_TOPIC_ARN: arn:aws:sns:${self:provider.region}:${aws:accountId}:pm-matches-${self:provider.stage}
    MATCH_THRESHOLD: 80

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/pm-*"
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource: "arn:aws:s3:::pm-img-anjal-${self:provider.stage}/*"
        - Effect: Allow
          Action:
            - rekognition:CompareFaces
            - rekognition:DetectLabels
            - rekognition:DetectFaces
          Resource: "*"
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: "*"
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:InitiateAuth
            - cognito-idp:AdminInitiateAuth
          Resource: "*"

functions:
  # Authentication
  authSignIn:
    handler: backend/lambda/auth.userSignIn
    events:
      - http:
          path: auth/login
          method: post
          cors: true

  authSignUp:
    handler: backend/lambda/auth.userSignUp
    events:
      - http:
          path: auth/signup
          method: post
          cors: true

  # Pet Management
  createPet:
    handler: backend/lambda/pets-create.createPet
    events:
      - http:
          path: pets
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

  getPets:
    handler: backend/lambda/pets-get.getPets
    events:
      - http:
          path: pets
          method: get
          cors: true

  # User Profile
  getUserProfile:
    handler: backend/lambda/user-profile.getUserProfile
    events:
      - http:
          path: users/profile
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

  getUserPets:
    handler: backend/lambda/user-pets.getUserPets
    environment:
      PETS_TABLE: pm-pets-dev
    events:
      - http:
          path: users/pets
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

  # Image Upload
  getPresignedUrl:
    handler: backend/lambda/upload.getPresignedUrl
    events:
      - http:
          path: upload/presigned-url
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

  # Get Matches for User
  getUserMatches:
    handler: backend/lambda/user-matches.getUserMatches
    events:
      - http:
          path: users/matches
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

  # Pet Matching (Rekognition)
  matchPets:
    handler: backend/lambda/pets-match.matchPets
    events:
      - http:
          path: pets/match
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn
      - sns: 
          arn: !Ref MatchesTopic
          topicName: pm-matches-${self:provider.stage}

  # Dashboard Stats
  getDashboardStats:
    handler: backend/lambda/dashboard-stats.getDashboardStats
    events:
      - http:
          path: pets/stats
          method: get
          cors: true

  # SNS Notifications
  sendNotification:
    handler: backend/lambda/sns-notify.sendNotification
    events:
      - http:
          path: notifications/send
          method: post
          cors: true

  # Admin Functions
  adminGetUsers:
    handler: backend/lambda/admin-users.getUsers
    events:
      - http:
          path: admin/users
          method: get
          cors: true

  adminGetDashboard:
    handler: backend/lambda/admin-dashboard.getAdminDashboard
    events:
      - http:
          path: admin/dashboard
          method: get
          cors: true

  adminGetAllPets:
    handler: backend/lambda/admin-pets.getAllPets
    events:
      - http:
          path: admin/pets
          method: get
          cors: true

  # Auth Triggers
  authPreSignup:
    handler: backend/lambda/auth-pre-signup.handler

  adminGetMatches:
    handler: backend/lambda/admin-matches.getMatches
    events:
      - http:
          path: admin/matches
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            name: cognitoAuthorizer
            arn: !GetAtt AuthPool.Arn

resources:
  Resources:
    # DynamoDB Tables
    PetsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pm-pets-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userIdIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pm-users-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: emailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pm-matches-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: lostPetId
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: lostPetIdIndex
            KeySchema:
              - AttributeName: lostPetId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    AlertsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pm-alerts-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # S3 Bucket for Images
    ImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: pm-img-anjal-${self:provider.stage}
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              NoncurrentVersionExpirationInDays: 90
              Status: Enabled

    # SNS Topics
    AlertsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: pm-alerts-${self:provider.stage}
        DisplayName: PM Alerts

    MatchesTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: pm-matches-${self:provider.stage}
        DisplayName: PM Matches

    # Cognito User Pool
    AuthPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: pm-auth-${self:provider.stage}
        LambdaConfig:
          PreSignUp: !GetAtt AuthPreSignupLambdaFunction.Arn
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
            RequireUppercase: true

    # Cognito User Pool Client
    AuthClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: pm-client-${self:provider.stage}
        UserPoolId: !Ref AuthPool
        ExplicitAuthFlows:
          - ADMIN_NO_SRP_AUTH
          - USER_PASSWORD_AUTH
        GenerateSecret: false

    # Permissions for Cognito to trigger Pre Sign-up Lambda
    AuthPreSignupLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt AuthPreSignupLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt AuthPool.Arn

  Outputs:
    ServiceEndpoint:
      Description: "API URL"
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: "ApiGatewayRestApi"
            - ".execute-api.${self:provider.region}.amazonaws.com/${self:provider.stage}"
    UserPoolId:
      Description: "Auth Pool ID"
      Value: !Ref AuthPool
    ClientId:
      Description: "Auth Client ID"
      Value: !Ref AuthClient
    BucketName:
      Description: "Images Bucket"
      Value: !Ref ImagesBucket
